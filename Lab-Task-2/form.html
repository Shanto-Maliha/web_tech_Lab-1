<html>

<head>
    <title>Registration</title>
</head>

<body>

    <h1>Registration</h1>

    <form method="Post" novalidate>

        <table>

            <tr>

                <td>

                    <fieldset>

                        <legend>General Information</legend>

                        <label for="fname">First Name :</label>
                        <input type="text" id="fname" name="fname" required>

                        <br><br>

                        <label for="lname">Last Name :</label>
                        <input type="text" id="lname" name="lname" required>

                        <br><br>

                        <label>Gender :</label>

                        <input type="radio" id="male" name="gender" value="Male">
                        <label for="male">Male</label>

                        <input type="radio" id="female" name="gender" value="Female">
                        <label for="female">Female</label>

                        <br><br>

                        <label for="father">Father's Name :</label>
                        <input type="text" id="father" name="father" required>

                        <input type="file" id="photo" name="photo">

                        <br><br>

                        <label for="mother">Mother's Name :</label>
                        <input type="text" id="mother" name="mother" required>

                        <br><br>

                        <label for="blood">Blood Group :</label>

                        <select id="blood" name="blood">
                            <option>Select Blood Group</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>

                        <br><br>

                        <label for="religion">Religion :</label>

                        <select id="religion" name="religion">
                            <option>Select Religion </option>
                            <option>Islam</option>
                            <option>Hinduism</option>


                            <option>Others</option>
                        </select>

                    </fieldset>

                </td>

                <td>

                    <fieldset>

                        <legend>Contact Information</legend>

                        <label for="email">Email :</label>
                        <input type="email" id="email" name="email">

                        <br><br>

                        <label for="phone">Phone/Mobile :</label>
                        <input type="text" id="phone" name="phone">

                        <br><br>

                        <label for="website">Website :</label>
                        <input type="text" id="website" name="website">

                        <br><br>

                        <fieldset>

                            <legend>Present Address</legend>

                            <select name="country">
                                <option>Select any one Country</option>
                                <option>Bangladesh</option>
                                <option>India</option>
                                <option>USA</option>
                                <option>UK</option>
                                <option>Canada</option>
                            </select>

                            <select name="city">
                                <option>Select any one City</option>
                                <option>Dhaka</option>
                                <option>Mymensingh</option>
                                <option>Chittagong</option>
                                <option>Khulna</option>
                                <option>Barishal</option>
                            </select>

                            <br><br>

                            <table>

                                <tr>

                                    <td>
                                        <label for="address">Address :</label>
                                    </td>

                                    <td>

                                        <textarea id="address" name="address" placeholder="Road/Street/City"></textarea>

                                        <br><br>

                                        <input type="number" id="postcode" name="postcode" placeholder="Post Code">

                                    </td>

                                </tr>

                            </table>

                        </fieldset>

                    </fieldset>

                </td>

                <td>
                    <fieldset>

                        <legend>Account Information</legend>

                        <label for="username">Username :</label>
                        <input type="text" id="username" name="username">

                        <br><br>

                        <label for="password">Password :</label>
                        <input type="password" id="password" name="password">

                        <br><br>

                        <label for="confimpassword">Confirm Password :</label>
                        <input type="password" id="confirmpassword" name="confirmpassword">
                        <br><br>
                        <input type="submit" id="register" name="register" value="Register">
                    </fieldset>
                </td>

            </tr>

        </table>

    </form>

</body>

</html>
